# Generator Model Configuration
# Maps question types to specific LLM providers for question generation
#
# Each question type is assigned to the provider that performs best
# on relevant benchmarks for that cognitive domain. Judges are assigned
# separately in judges.yaml using cross-provider judging (different provider
# from generator to avoid self-evaluation bias).
#
# Configuration Structure:
#   question_type:
#     provider: Provider name ("openai", "anthropic", "google", "xai")
#     model: Exact API model identifier (must match provider SDK expectations)
#     rationale: Explanation of why this provider was chosen
#     fallback: Fallback provider if primary is unavailable
#     fallback_model: Exact API model identifier for the fallback provider
#
# IMPORTANT - Model Naming Convention:
#   Model identifiers MUST match the exact strings used by each provider's API:
#   - Anthropic: claude-opus-4-6, claude-sonnet-4-5-20251001, etc.
#   - Google: gemini-3-pro-preview, gemini-3-flash-preview, gemini-2.5-pro, etc.
#   - OpenAI: gpt-5.2, gpt-4-turbo, o4-mini, etc.
#   - xAI: grok-4, grok-3
#   See each provider's get_available_models() for the full list.
#
# Google Model Naming (Preview vs Stable):
#   Google uses "-preview" suffix for new models in preview phase (e.g., gemini-3-pro-preview).
#   Once a model graduates to stable, the suffix is removed (e.g., gemini-2.5-pro).
#   Preview models may have API changes; stable models have frozen APIs.
#   Always check Google's release notes when updating model identifiers.

version: "1.0"

generators:
  math:
    provider: "anthropic"
    model: "claude-sonnet-4-5-20250929"
    max_batch_size: 10
    rationale: "Composite 91.71 leads all models on AIME 2025 (87.0%) and GSM8K (98.0%) with null-redistributed weights (FrontierMath data unavailable; 30% weight redistributed — true composite may be lower). Delta +9.92 over prior gpt-5.2 assignment (81.79). Fallback: openai/gpt-5.2 (composite 81.79, full benchmark coverage). Updated Mar 2026 via /refresh-providers."
    fallback: "openai"
    fallback_model: "gpt-5.2"

  logic:
    provider: "anthropic"
    model: "claude-sonnet-4-5-20250929"
    max_batch_size: 10
    rationale: "Claude Sonnet 4.5 (Jan 2026): SWE-bench verified 77-82%, GPQA Diamond 83.4%, HumanEval >95%. Major upgrade from Claude 3.5 Sonnet (49% SWE-bench) for logic and reasoning tasks."
    fallback: "openai"
    fallback_model: "gpt-5.2"

  pattern:
    provider: "openai"
    model: "gpt-5.2"
    max_batch_size: 10
    rationale: "ARC-AGI-2: 52.9% (Thinking), MMMU-Pro: 86.5%. Leads all models on abstract pattern reasoning. Updated Jan 2026."
    fallback: "anthropic"
    fallback_model: "claude-opus-4-6"

  spatial:
    provider: "openai"
    model: "gpt-5.2"
    max_batch_size: 10
    rationale: "ARC-AGI-2: 52.9%, MMMU-Pro: 86.5%, Video-MMMU: 90.5%. Composite 75.9 leads all models. Updated Jan 2026."
    fallback: "google"
    fallback_model: "gemini-2.5-pro"

  verbal:
    provider: "anthropic"
    model: "claude-sonnet-4-5-20250929"
    max_batch_size: 10
    rationale: "Claude Sonnet 4.5 (Jan 2026): MMLU 89%, HellaSwag ~95%. Enhanced language understanding and generation with superior NLP performance. Fallback: google/gemini-3.1-pro-preview (composite 91.01, Δ+5.34 vs prior gpt-5.2 fallback). Updated Mar 2026 via /refresh-providers."
    fallback: "google"
    fallback_model: "gemini-3.1-pro-preview"

  memory:
    provider: "google"
    model: "gemini-3.1-pro-preview"
    max_batch_size: 10
    rationale: "Composite 72.3 leads all models. MMLU 91.8% with 1M token context window (norm 50.0). Strong knowledge + largest context for memory tasks. gemini-3-pro-preview shut down 2026-03-09; migrated to gemini-3.1-pro-preview (direct replacement). Updated Mar 2026."
    fallback: "openai"
    fallback_model: "gpt-5.2"

# Default generator (fallback for unknown question types)
default_generator:
  provider: "openai"
  model: "gpt-4-turbo"
  rationale: "General-purpose fallback generator"
  fallback: "anthropic"
  fallback_model: "claude-sonnet-4-5-20250929"

# Enable/disable specialist routing
# When false, falls back to round-robin distribution
use_specialist_routing: true

# Notes:
# - Provider names must match: "openai", "anthropic", "google", or "xai"
# - Fallback is used when primary provider's circuit breaker is open
# - judges.yaml uses cross-provider judging (different provider than generator)
