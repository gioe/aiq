      - o1
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - gpt-4-turbo-preview
      - gpt-4
      - gpt-4-0125-preview
      - gpt-3.5-turbo
      - gpt-3.5-turbo-16k
    pricing:
