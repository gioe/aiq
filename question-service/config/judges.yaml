# Judge Model Configuration
# Maps question types to specific judge models for quality evaluation
#
# Each question type is evaluated by a model from a DIFFERENT provider
# than the generator. This prevents self-evaluation bias (same model
# judging its own output). The judge is a THIRD provider independent from
# both the primary generator and the generator's fallback — ensuring
# cross-provider independence even when the primary generator is unavailable.
#
# Provider independence chain (per question type):
#   Generator primary → Generator fallback → Judge primary → Judge fallback
#   NOTE: With only 3 active providers (openai/anthropic/google), full 4-provider
#   independence is no longer achievable. Judge fallbacks are best-effort:
#   assigned to whichever of the remaining providers is not the judge primary.
#   xAI/grok-4 removed as fallback (credits exhausted 2026-03-27).
#
# Configuration Structure:
#   question_type:
#     model: Exact API model identifier (must match provider SDK expectations)
#     provider: Provider name ("openai", "anthropic", "google", "xai")
#     rationale: Explanation of why this model was chosen
#     enabled: Whether this judge is active (default: true)
#     fallback: Optional fallback provider if primary is unavailable
#     fallback_model: Optional specific model to use with the fallback provider
#
# IMPORTANT - Model Naming Convention:
#   Model identifiers MUST match the exact strings used by each provider's API:
#   - Anthropic: claude-opus-4-7, claude-sonnet-4-5-20250929, etc.
#   - Google: gemini-3-pro-preview, gemini-3-flash-preview, gemini-2.5-pro, etc.
#   - OpenAI: gpt-5.5, gpt-5.2, o4-mini, etc.
#   - xAI: grok-4, grok-3
#   See each provider's get_available_models() for the full list.
#
# Google Model Naming (Preview vs Stable):
#   Google uses "-preview" suffix for new models in preview phase (e.g., gemini-3-pro-preview).
#   Once a model graduates to stable, the suffix is removed (e.g., gemini-2.5-pro).
#   Preview models may have API changes; stable models have frozen APIs.
#   Always check Google's release notes when updating model identifiers.

version: "1.0"

judges:
  math:
    model: "gemini-3.1-pro-preview"
    provider: "google"
    rationale: "Cross-provider judge: generator is anthropic/claude-sonnet-4-5, gen_fallback is openai/gpt-5.5. Google is the third independent provider — AIME 2025 (95.0%), FrontierMath (38.0%), GSM8K (98.0%), math composite 78.80. Judge fallback upgraded from claude-opus-4-6 to claude-opus-4-7 after Anthropic's 2026-04-16 API availability announcement. Reviewed Apr 2026."
    benchmark_data:
      AIME_2025: "95.0%"
      FrontierMath: "38.0%"
      GSM8K: "98.0%"
    enabled: true
    fallback: "anthropic"
    fallback_model: "claude-opus-4-7"

  logic:
    model: "gemini-2.5-pro"
    provider: "google"
    rationale: "Cross-provider judge: generator is anthropic/claude-sonnet-4-5, gen_fallback is openai/gpt-5.5. Google is the third independent provider — GPQA Diamond (84.0%), SWE-bench Verified (63.0%), HumanEval (90.0%), composite 79.0. gemini-2.5-pro requires thinking_budget in ThinkingConfig (added SDK 1.15.0); fixed Mar 2026 by upgrading google-genai>=1.15.0 and adding thinking_budget=-1 (AUTOMATIC) to all GenerateContentConfig calls. Judge fallback upgraded from claude-opus-4-6 to claude-opus-4-7 after Anthropic's 2026-04-16 API availability announcement. Reviewed Apr 2026."
    benchmark_data:
      GPQA_Diamond: "84.0%"
      SWE_bench_Verified: "63.0%"
      HumanEval: "90.0%"
    enabled: true
    fallback: "anthropic"
    fallback_model: "claude-opus-4-7"

  pattern:
    model: "gemini-2.5-pro"
    provider: "google"
    rationale: "Cross-provider judge: generator is openai/gpt-5.5, gen_fallback is anthropic. Google is the third independent provider — ARC-AGI-2 (31.1%), MMMU-Pro (81%), composite 51.06. gemini-2.5-pro requires thinking_budget in ThinkingConfig (added SDK 1.15.0); fixed Mar 2026 by upgrading google-genai>=1.15.0 and adding thinking_budget=-1 (AUTOMATIC) to all GenerateContentConfig calls. Judge fallback upgraded from claude-opus-4-6 to claude-opus-4-7 after Anthropic's 2026-04-16 API availability announcement. Reviewed Apr 2026."
    benchmark_data:
      ARC_AGI_2: "31.1%"
      MMMU_Pro: "81.0%"
    enabled: true
    fallback: "anthropic"
    fallback_model: "claude-opus-4-7"

  spatial:
    model: "claude-opus-4-7"
    provider: "anthropic"
    rationale: "Cross-provider judge: generator is openai/gpt-5.5, gen_fallback is google. Anthropic is the third independent provider. Upgraded from claude-opus-4-6 to claude-opus-4-7 after Anthropic's 2026-04-16 API availability announcement; Opus 4.7 improves Opus 4.6 on coding, vision, and complex multi-step tasks at lower listed API pricing. Judge fallback remains google/gemini-2.5-pro. Reviewed Apr 2026."
    benchmark_data:
      provider_review: "Opus 4.7 improves Opus 4.6 on coding, vision, and complex multi-step tasks; AIQ spatial benchmark pending."
    enabled: true
    fallback: "google"
    fallback_model: "gemini-2.5-pro"

  verbal:
    model: "gpt-5.5"
    provider: "openai"
    rationale: "Cross-provider judge: generator is anthropic/claude-sonnet-4-5, gen_fallback is google. OpenAI is the third independent provider. Upgraded from gpt-5.2 to gpt-5.5 after OpenAI's 2026-04-24 API availability update; GPT-5.5 improves GPT-5.4 on knowledge-work and reasoning benchmarks. Judge fallback upgraded from claude-opus-4-6 to claude-opus-4-7 after Anthropic's 2026-04-16 API availability announcement. Reviewed Apr 2026."
    benchmark_data:
      GDPval: "84.9% wins-or-ties"
      BrowseComp: "84.4%"
    enabled: true
    fallback: "anthropic"
    fallback_model: "claude-opus-4-7"

  memory:
    model: "claude-opus-4-7"
    provider: "anthropic"
    rationale: "Cross-provider judge: generator is google/gemini-3.1-pro-preview, gen_fallback is openai/gpt-5.5. Anthropic is the third independent provider. Upgraded from claude-opus-4-6 to claude-opus-4-7 after Anthropic's 2026-04-16 API availability announcement; Opus 4.7 improves Opus 4.6 on complex multi-step and vision tasks. Judge fallback remains google/gemini-2.5-pro. Reviewed Apr 2026."
    benchmark_data:
      provider_review: "Opus 4.7 improves Opus 4.6 on complex multi-step and vision tasks; AIQ memory benchmark pending."
    enabled: true
    fallback: "google"
    fallback_model: "gemini-2.5-pro"

# Default judge (fallback for unknown question types)
# default_generator is openai/gpt-5.5 with fallback anthropic — so judge must be
# a third provider (google). Using google/gemini-2.5-pro; fallback anthropic/claude-opus-4-7.
default_judge:
  model: "gemini-2.5-pro"
  provider: "google"
  rationale: "Cross-provider fallback judge: default generator is openai/gpt-5.5, gen_fallback is anthropic. Google is the third independent provider. gemini-2.5-pro requires thinking_budget in ThinkingConfig (added SDK 1.15.0); fixed Mar 2026 by upgrading google-genai>=1.15.0 and adding thinking_budget=-1 (AUTOMATIC). Judge fallback upgraded from claude-opus-4-6 to claude-opus-4-7 after Anthropic's 2026-04-16 API availability announcement. Reviewed Apr 2026."
  fallback: "anthropic"
  fallback_model: "claude-opus-4-7"
  enabled: true

# Evaluation criteria weights (0.0 to 1.0)
# These determine how heavily each factor is weighted in the ACCEPTANCE score.
# Difficulty is NOT included here - it determines PLACEMENT, not acceptance.
evaluation_criteria:
  clarity: 0.30              # Question is clear and unambiguous
  validity: 0.40             # Valid as an IQ test question
  formatting: 0.20           # Properly formatted with correct answer
  creativity: 0.10           # Novel and interesting question

# Minimum score threshold for question approval (0.0 to 1.0)
min_judge_score: 0.7

# Difficulty placement configuration
# Difficulty score determines where a question is placed, not whether it's accepted.
# A high-quality question that's "too easy for hard" will be accepted but placed at medium.
difficulty_placement:
  # Primary: Use numeric difficulty_score to determine placement
  # If score is below threshold, downgrade one level; if above, upgrade one level
  downgrade_threshold: 0.4   # Score below this → downgrade (e.g., hard → medium)
  upgrade_threshold: 0.8     # Score above this → upgrade (e.g., easy → medium)

  # Fallback: Pattern matching on judge feedback
  # Used when numeric score is ambiguous (between thresholds)
  too_easy_patterns:
    - "too easy"
    - "easier than"
    - "success rate 70"
    - "success rate 80"
    - "straightforward"
  too_hard_patterns:
    - "too hard"
    - "too difficult"
    - "harder than"
    - "success rate 10"
    - "success rate 5"

# Answer verification configuration
answer_verification:
  enabled: true

# Notes:
# - Model identifiers should match the exact model names used by provider SDKs
# - Provider names must match: "openai", "anthropic", "google", or "xai"
# - Enabled flag can be used to temporarily disable specific judges
# - Evaluation criteria weights should sum to 1.0 (difficulty excluded)
