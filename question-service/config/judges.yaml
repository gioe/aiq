# Judge Model Configuration
# Maps question types to specific judge models for quality evaluation
#
# Each question type is evaluated by a model from a DIFFERENT provider
# than the generator. This prevents self-evaluation bias (same model
# judging its own output). The judge is typically the generator's
# configured fallback provider, which already has domain-relevant rationale.
#
# Configuration Structure:
#   question_type:
#     model: Exact API model identifier (must match provider SDK expectations)
#     provider: Provider name ("openai", "anthropic", "google", "xai")
#     rationale: Explanation of why this model was chosen
#     enabled: Whether this judge is active (default: true)
#     fallback: Optional fallback provider if primary is unavailable
#     fallback_model: Optional specific model to use with the fallback provider
#
# IMPORTANT - Model Naming Convention:
#   Model identifiers MUST match the exact strings used by each provider's API:
#   - Anthropic: claude-opus-4-5-20251101, claude-sonnet-4-5-20250929, etc.
#   - Google: gemini-3-pro-preview, gemini-3-flash-preview, gemini-2.5-pro, etc.
#   - OpenAI: gpt-5.2, gpt-4-turbo, o4-mini, etc.
#   - xAI: grok-4, grok-3
#   See each provider's get_available_models() for the full list.
#
# Google Model Naming (Preview vs Stable):
#   Google uses "-preview" suffix for new models in preview phase (e.g., gemini-3-pro-preview).
#   Once a model graduates to stable, the suffix is removed (e.g., gemini-2.5-pro).
#   Preview models may have API changes; stable models have frozen APIs.
#   Always check Google's release notes when updating model identifiers.

version: "1.0"

judges:
  math:
    model: "gemini-3-pro-preview"
    provider: "google"
    rationale: "Cross-provider judge: generator is openai/gpt-5.2. Gemini 3 Pro provides independent math evaluation — AIME 2025 (95%), FrontierMath (38%), GSM8K (99%), composite 79.10. Using a different provider prevents self-evaluation bias. Updated Mar 2026."
    benchmark_data:
      AIME_2025: "95.0%"
      FrontierMath: "38.0%"
      GSM8K: "99.0%"
      GPQA_Diamond: "91.9%"
    enabled: true
    fallback: "anthropic"
    fallback_model: "claude-opus-4-5-20251101"

  logic:
    model: "gpt-5.2"
    provider: "openai"
    rationale: "Cross-provider judge: generator is anthropic/claude-sonnet-4-5. GPT-5.2 provides independent logic evaluation — GPQA Diamond (93.2%), SWE-bench Verified (80%), HumanEval (95%), composite 89.03. Strongest non-anthropic model for logical reasoning. Updated Mar 2026."
    benchmark_data:
      GPQA_Diamond: "93.2%"
      SWE_bench_Verified: "80.0%"
      HumanEval: "95.0%"
    enabled: true
    fallback: "google"
    fallback_model: "gemini-3-pro-preview"

  pattern:
    model: "claude-opus-4-5-20251101"
    provider: "anthropic"
    rationale: "Cross-provider judge: generator is openai/gpt-5.2. Claude Opus 4.5 provides independent pattern evaluation — ARC-AGI-2 (37.6%), MMMU-Pro (60%), composite 46.56. Best non-openai model for abstract reasoning evaluation. Updated Mar 2026."
    benchmark_data:
      ARC_AGI_2: "37.6%"
      MMMU_Pro: "60.0%"
      HumanEval: "97.6%"
    enabled: true
    fallback: "google"
    fallback_model: "gemini-3-pro-preview"

  spatial:
    model: "gemini-3-pro-preview"
    provider: "google"
    rationale: "Cross-provider judge: generator is openai/gpt-5.2. Gemini 3 Pro provides independent spatial evaluation — ARC-AGI-2 (31.1%), MMMU-Pro (81%), Video-MMMU (87.6%), composite 65.52. Best non-openai model for spatial reasoning. Updated Mar 2026."
    benchmark_data:
      ARC_AGI_2: "31.1%"
      MMMU_Pro: "81.0%"
      Video_MMMU: "87.6%"
    enabled: true
    fallback: "anthropic"
    fallback_model: "claude-opus-4-5-20251101"

  verbal:
    model: "gpt-5.2"
    provider: "openai"
    rationale: "Cross-provider judge: generator is anthropic/claude-sonnet-4-5. GPT-5.2 provides independent verbal evaluation — MMLU (88%), MMLU-Pro (83%), composite 85.67. Strong language understanding without self-evaluation bias. Updated Mar 2026."
    benchmark_data:
      MMLU: "88.0%"
      MMLU_Pro: "83.0%"
      HumanEval: "95.0%"
    enabled: true
    fallback: "google"
    fallback_model: "gemini-3-pro-preview"

  memory:
    model: "gpt-5.2"
    provider: "openai"
    rationale: "Cross-provider judge: generator is google/gemini-3-pro-preview. GPT-5.2 provides independent memory evaluation — MMLU (88%), 400K context window, composite 56.27. Best non-google model for knowledge and retention assessment. Updated Mar 2026."
    benchmark_data:
      MMLU: "88.0%"
      MMLU_Pro: "83.0%"
      context_window: "400,000 tokens"
    enabled: true
    fallback: "anthropic"
    fallback_model: "claude-opus-4-5-20251101"

# Default judge (fallback for unknown question types)
# Uses anthropic since default_generator uses openai — cross-provider convention.
default_judge:
  model: "claude-sonnet-4-5-20250929"
  provider: "anthropic"
  rationale: "Cross-provider fallback judge: default generator is openai/gpt-4-turbo"
  enabled: true

# Evaluation criteria weights (0.0 to 1.0)
# These determine how heavily each factor is weighted in the ACCEPTANCE score.
# Difficulty is NOT included here - it determines PLACEMENT, not acceptance.
evaluation_criteria:
  clarity: 0.30              # Question is clear and unambiguous
  validity: 0.40             # Valid as an IQ test question
  formatting: 0.20           # Properly formatted with correct answer
  creativity: 0.10           # Novel and interesting question

# Minimum score threshold for question approval (0.0 to 1.0)
min_judge_score: 0.7

# Difficulty placement configuration
# Difficulty score determines where a question is placed, not whether it's accepted.
# A high-quality question that's "too easy for hard" will be accepted but placed at medium.
difficulty_placement:
  # Primary: Use numeric difficulty_score to determine placement
  # If score is below threshold, downgrade one level; if above, upgrade one level
  downgrade_threshold: 0.4   # Score below this → downgrade (e.g., hard → medium)
  upgrade_threshold: 0.8     # Score above this → upgrade (e.g., easy → medium)

  # Fallback: Pattern matching on judge feedback
  # Used when numeric score is ambiguous (between thresholds)
  too_easy_patterns:
    - "too easy"
    - "easier than"
    - "success rate 70"
    - "success rate 80"
    - "straightforward"
  too_hard_patterns:
    - "too hard"
    - "too difficult"
    - "harder than"
    - "success rate 10"
    - "success rate 5"

# Notes:
# - Model identifiers should match the exact model names used by provider SDKs
# - Provider names must match: "openai", "anthropic", "google", or "xai"
# - Enabled flag can be used to temporarily disable specific judges
# - Evaluation criteria weights should sum to 1.0 (difficulty excluded)
